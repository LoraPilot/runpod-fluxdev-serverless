services:
  flux-dev-worker:
    image: flux-dev-worker:dev
    pull_policy: never
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - RUN_MODE=local-api
      - FLUX_DEV_PRELOAD=true
      - HUGGINGFACE_ACCESS_TOKEN=${HUGGINGFACE_ACCESS_TOKEN:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data/runpod-volume:/runpod-volume
